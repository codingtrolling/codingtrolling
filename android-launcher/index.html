<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Android Simulator // codingtrolling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --android-blue: #3b82f6; --bg-url: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070'); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Boot Animation */
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-anim { font-size: 2rem; font-weight: 900; color: #fff; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }

        /* OS UI */
        #os-container { position: relative; width: 100%; height: 100%; background: var(--bg-url) center/cover; display: none; }
        .status-bar { height: 30px; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 12px; font-weight: bold; color: white; position: absolute; top: 0; width: 100%; z-index: 100; }
        
        /* Shade / Control Center */
        #control-center { position: absolute; top: -100%; left: 0; width: 100%; height: 80%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); z-index: 200; transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 0 0 30px 30px; padding: 40px 20px; }
        #control-center.active { top: 0; }
        .toggle-btn { background: #1e293b; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px; color: white; cursor: pointer; transition: 0.2s; }
        .toggle-btn.on { background: var(--android-blue); }

        /* App Grid */
        .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 60px 20px; }
        .app-icon { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .app-img { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Window System */
        .window { position: absolute; inset: 0; background: #0f172a; z-index: 50; display: none; flex-direction: column; }
        .window-header { height: 60px; display: flex; align-items: center; padding: 0 20px; gap: 15px; background: #1e293b; color: white; }
        .window-content { flex: 1; overflow-y: auto; padding: 15px; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="logo-anim uppercase tracking-tighter">coding<span class="text-blue-500">trolling</span></div>
        <div class="mt-4 text-slate-500 text-xs uppercase font-bold tracking-widest">Powered by Android</div>
    </div>

    <div id="os-container">
        <div class="status-bar" onclick="toggleShade()">
            <div id="stat-clock">12:00</div>
            <div class="flex gap-2 items-center">
                <i id="wifi-icon" class="bi bi-wifi"></i>
                <i class="bi bi-battery-full"></i>
                <span id="stat-batt">85%</span>
            </div>
        </div>

        <div id="control-center">
            <div class="grid grid-cols-3 gap-4">
                <div class="toggle-btn" id="t-wifi" onclick="toggleSetting('wifi')">
                    <i class="bi bi-wifi text-2xl"></i><span class="text-[10px] font-bold">Wi-Fi</span>
                </div>
                <div class="toggle-btn" id="t-plane" onclick="toggleSetting('plane')">
                    <i class="bi bi-airplane text-2xl"></i><span class="text-[10px] font-bold">Airplane</span>
                </div>
                <div class="toggle-btn" id="t-vol" onclick="toggleSetting('vol')">
                    <i class="bi bi-volume-up text-2xl"></i><span class="text-[10px] font-bold">Volume</span>
                </div>
            </div>
            <div class="mt-8">
                <label class="text-xs text-slate-400 font-bold">BRIGHTNESS</label>
                <input type="range" class="w-full mt-2 accent-blue-500">
            </div>
            <button class="mt-auto w-full py-4 text-slate-500 font-bold" onclick="toggleShade()">CLOSE</button>
        </div>

        <div class="app-grid">
            <div class="app-icon" onclick="openApp('youtube')">
                <div class="app-img bg-red-600"><i class="bi bi-youtube"></i></div>
                <span class="text-white text-[10px] font-bold">YouTube</span>
            </div>
            <div class="app-icon" onclick="openApp('settings')">
                <div class="app-img bg-slate-600"><i class="bi bi-gear-fill"></i></div>
                <span class="text-white text-[10px] font-bold">Settings</span>
            </div>
            <div class="app-icon" onclick="openApp('terminal')">
                <div class="app-img bg-black border border-slate-700"><i class="bi bi-terminal"></i></div>
                <span class="text-white text-[10px] font-bold">Terminal</span>
            </div>
            <div class="app-icon" onclick="openApp('notes')">
                <div class="app-img bg-yellow-500"><i class="bi bi-journal-text"></i></div>
                <span class="text-white text-[10px] font-bold">Notes</span>
            </div>
        </div>

        <div id="app-youtube" class="window">
            <div class="window-header">
                <i class="bi bi-arrow-left text-xl" onclick="closeApp('youtube')"></i>
                <span class="font-bold">YouTube Mobile</span>
            </div>
            <div class="window-content space-y-4">
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0"></iframe>
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/jfKfPfyJRdk" frameborder="0"></iframe>
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/9bZkp7q19f0" frameborder="0"></iframe>
                <iframe class="w-full aspect-video rounded-xl" src="https://www.youtube.com/embed/3JZ_D3ELwOQ" frameborder="0"></iframe>
            </div>
        </div>

        <div id="app-settings" class="window">
            <div class="window-header">
                <i class="bi bi-arrow-left text-xl" onclick="closeApp('settings')"></i>
                <span class="font-bold">Settings</span>
            </div>
            <div class="window-content">
                <div class="bg-slate-800 p-4 rounded-xl mb-4">
                    <p class="text-xs text-slate-400">Device Name</p>
                    <p class="font-bold">CodingTrolling Phone (V1)</p>
                </div>
                <button onclick="resetOS()" class="w-full bg-red-500/20 text-red-500 py-3 rounded-xl font-bold">Factory Reset</button>
            </div>
        </div>

        <div id="app-terminal" class="window">
            <div class="window-header">
                <i class="bi bi-arrow-left text-xl" onclick="closeApp('terminal')"></i>
                <span class="font-bold">System Terminal</span>
            </div>
            <div class="window-content bg-black font-mono text-green-500 text-sm">
                <p>> android_os_init... DONE</p>
                <p>> Checking storage... 128GB OK</p>
                <p>> user@codingtrolling:~$ <span class="animate-pulse">_</span></p>
            </div>
        </div>

    </div>

    <script>
        // 1. Initial State & Persistance
        let state = JSON.parse(localStorage.getItem('android_setup')) || {
            firstTime: true,
            wifi: true,
            plane: false,
            vol: true,
            wallpaper: 'default'
        };

        // 2. Boot Sequence
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('os-container').style.display = 'block';
                updateSystemUI();
            }, 3000); // 3 second boot
        });

        // 3. System Functions
        function updateSystemUI() {
            document.getElementById('stat-clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('t-wifi').className = `toggle-btn ${state.wifi ? 'on' : ''}`;
            document.getElementById('t-plane').className = `toggle-btn ${state.plane ? 'on' : ''}`;
            document.getElementById('t-vol').className = `toggle-btn ${state.vol ? 'on' : ''}`;
            document.getElementById('wifi-icon').style.opacity = state.wifi ? '1' : '0.2';
            localStorage.setItem('android_setup', JSON.stringify(state));
        }

        function toggleShade() {
            document.getElementById('control-center').classList.toggle('active');
        }

        function toggleSetting(key) {
            state[key] = !state[key];
            updateSystemUI();
        }

        function openApp(id) {
            document.getElementById(`app-${id}`).style.display = 'flex';
        }

        function closeApp(id) {
            document.getElementById(`app-${id}`).style.display = 'none';
        }

        function resetOS() {
            if(confirm("Factory Reset? All data will be lost.")) {
                localStorage.removeItem('android_setup');
                window.location.reload();
            }
        }

        // Clock Auto-update
        setInterval(() => {
            document.getElementById('stat-clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
  </html>

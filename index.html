<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub // codingtrolling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* YOUR ORIGINAL STYLES REMAIN UNTOUCHED */
        body { margin: 0; background: #0b0f1a; font-family: sans-serif; color: white; overflow: hidden; }
        #main-menu { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { width: 280px; padding: 15px; margin: 10px; background: #2563eb; color: white; font-weight: bold; text-align: center; border-radius: 12px; cursor: pointer; border: none; }

        /* ADDED MODAL ONLY (HIDDEN BY DEFAULT) */
        #profile-modal {
            display: none; position: fixed; inset: 0; z-index: 999;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }
        .settings-card { background: #161b22; border: 1px solid #30363d; padding: 2rem; border-radius: 20px; width: 90%; max-width: 400px; }
        input { width: 100%; background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 8px; color: white; margin-bottom: 1rem; outline: none; }
    </style>
</head>
<body>

    <div id="profile-modal">
        <div class="settings-card">
            <h2 class="text-xl font-bold mb-4">SETTINGS</h2>
            <input type="text" id="username-input" placeholder="Username">
            <input type="text" id="skin-input" placeholder="Skin URL">
            <button onclick="saveProfile()" class="menu-btn w-full m-0">Save</button>
            <button onclick="closeSettings()" class="w-full text-slate-500 mt-4 text-sm">Cancel</button>
        </div>
    </div>

    <div id="main-menu">
        <div class="absolute top-8 right-8">
            <button onclick="openSettings()" class="text-white opacity-50 hover:opacity-100 transition-opacity">
                <i class="bi bi-gear-fill text-2xl"></i>
            </button>
        </div>

        <h1 class="text-7xl font-black italic tracking-tighter">HUB</h1>
        
        <button class="menu-btn" onclick="location.href='suscraft/index.html'">Launch SusCraft</button>
        <button class="menu-btn opacity-40 cursor-not-allowed">Other Games</button>
    </div>

    <script>
        // 1. URL HASH LOGIC
        window.addEventListener('DOMContentLoaded', () => {
            // Load data
            document.getElementById('username-input').value = localStorage.getItem('suscraft_username') || '';
            document.getElementById('skin-input').value = localStorage.getItem('suscraft_skin') || '';

            // Handle initial load with #settings
            if(window.location.hash === '#settings') toggleModal(true);
        });

        window.addEventListener('hashchange', () => {
            toggleModal(window.location.hash === '#settings');
        });

        // 2. PROFILE FUNCTIONS
        function openSettings() {
            window.location.hash = 'settings'; // Updates address bar to codingtrolling.com/#settings
        }

        function closeSettings() {
            window.location.hash = ''; // Clears address bar
        }

        function toggleModal(show) {
            document.getElementById('profile-modal').style.display = show ? 'flex' : 'none';
        }

        function saveProfile() {
            localStorage.setItem('suscraft_username', document.getElementById('username-input').value);
            localStorage.setItem('suscraft_skin', document.getElementById('skin-input').value);
            closeSettings();
        }
    </script>
</body>
</html>

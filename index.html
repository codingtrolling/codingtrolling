<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub // codingtrolling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { margin: 0; background: #0b0f1a; font-family: sans-serif; color: white; overflow: hidden; }
        
        #main-menu {
            height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0f1a 100%);
        }

        .menu-btn {
            width: 280px; padding: 15px; margin: 10px; 
            background: #2563eb; color: white; font-weight: bold; 
            text-align: center; border-radius: 12px; cursor: pointer; 
            border: none; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .menu-btn:hover { background: #3b82f6; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }

        /* Settings Overlay */
        #profile-modal {
            display: none; position: fixed; inset: 0; z-index: 300;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }

        .settings-card {
            background: #161b22; border: 1px solid #30363d;
            padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 420px;
        }

        input {
            width: 100%; background: #0d1117; border: 1px solid #30363d;
            padding: 12px; border-radius: 10px; color: white; margin-bottom: 1.5rem;
            outline: none;
        }
        input:focus { border-color: #2563eb; ring: 2px solid #2563eb; }
    </style>
</head>
<body>

    <div id="profile-modal">
        <div class="settings-card">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black italic tracking-tighter">SETTINGS</h2>
                    <p class="text-slate-500 text-xs uppercase font-bold tracking-widest">Profile & Identity</p>
                </div>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="bi bi-x-circle-fill text-2xl"></i>
                </button>
            </div>
            
            <label class="block text-blue-500 text-[10px] font-black mb-2 uppercase tracking-widest">Global Username</label>
            <input type="text" id="username-input" placeholder="Enter name...">
            
            <label class="block text-blue-500 text-[10px] font-black mb-2 uppercase tracking-widest">Character Skin (Direct Link)</label>
            <input type="text" id="skin-input" placeholder="https://...">
            
            <button onclick="saveProfile()" class="menu-btn w-full m-0 shadow-lg">Apply Changes</button>
        </div>
    </div>

    <div id="main-menu">
        <div class="absolute top-8 right-8">
            <button onclick="openSettings()" class="bg-white/5 hover:bg-white/10 text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all border border-white/10">
                <i class="bi bi-person-fill-gear text-xl"></i>
            </button>
        </div>

        <div class="text-center mb-12">
            <h1 class="text-7xl font-black text-white italic tracking-tighter">HUB</h1>
            <div class="h-1 w-24 bg-blue-600 mx-auto mt-2 rounded-full"></div>
        </div>
        
        <button class="menu-btn" onclick="location.href='suscraft/index.html'">Launch SusCraft</button>
        <button class="menu-btn opacity-40 cursor-not-allowed">Other Games</button>
        
        <p class="absolute bottom-8 text-slate-600 text-[10px] font-bold uppercase tracking-[0.3em]">codingtrolling.com</p>
    </div>

    <script>
        // Check hash and load data on boot
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username-input').value = localStorage.getItem('suscraft_username') || '';
            document.getElementById('skin-input').value = localStorage.getItem('suscraft_skin') || '';

            if(window.location.hash === '#settings') {
                toggleModal(true);
            }
        });

        // Sync visibility with the address bar hash
        window.addEventListener('hashchange', () => {
            toggleModal(window.location.hash === '#settings');
        });

        function openSettings() {
            window.location.hash = 'settings';
        }

        function closeSettings() {
            window.location.hash = ''; // Clears the address bar back to codingtrolling.com/
        }

        function toggleModal(show) {
            document.getElementById('profile-modal').style.display = show ? 'flex' : 'none';
        }

        function saveProfile() {
            const user = document.getElementById('username-input').value;
            const skin = document.getElementById('skin-input').value;
            
            localStorage.setItem('suscraft_username', user);
            localStorage.setItem('suscraft_skin', skin);
            
            closeSettings();
        }
    </script>
</body>
</html>

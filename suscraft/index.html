<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SusCraft 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; z-index: 10; display: none; }
        #main-menu { position: fixed; inset: 0; z-index: 200; background: #0b0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { width: 280px; padding: 15px; margin: 10px; background: #2563eb; color: white; font-weight: bold; text-align: center; border-radius: 10px; cursor: pointer; border: none; }
        .ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: none; }
        .pointer-auto { pointer-events: auto; }
    </style>
</head>
<body>

    <div id="crosshair">+</div>

    <div id="main-menu">
        <h1 class="text-6xl font-black text-white mb-10 italic tracking-tighter">SUSCRAFT</h1>
        <button class="menu-btn" onclick="startGame()">PLAY GAME</button>
        <div class="menu-btn opacity-50 cursor-not-allowed text-sm">Multiplayer (Coming Soon)</div>
        <a href="../index.html" class="text-slate-500 mt-4 uppercase text-xs font-bold">Quit Game</a>
    </div>

    <div id="game-ui" class="ui-layer">
        <div class="absolute top-5 left-5 pointer-auto">
            <button onclick="toggleCamera()" class="bg-black/60 text-white p-4 rounded-xl text-xl border border-white/20"><i class="bi bi-camera-video"></i></button>
        </div>
        
        <div class="absolute bottom-10 left-10 pointer-auto grid grid-cols-3 gap-2">
            <div></div><button class="w-16 h-16 bg-white/20 rounded-xl text-white" ontouchstart="keys.w=true" ontouchend="keys.w=false"><i class="bi bi-caret-up-fill"></i></button><div></div>
            <button class="w-16 h-16 bg-white/20 rounded-xl text-white" ontouchstart="keys.a=true" ontouchend="keys.a=false"><i class="bi bi-caret-left-fill"></i></button>
            <button class="w-16 h-16 bg-white/20 rounded-xl text-white" ontouchstart="keys.s=true" ontouchend="keys.s=false"><i class="bi bi-caret-down-fill"></i></button>
            <button class="w-16 h-16 bg-white/20 rounded-xl text-white" ontouchstart="keys.d=true" ontouchend="keys.d=false"><i class="bi bi-caret-right-fill"></i></button>
        </div>

        <div class="absolute bottom-10 right-10 pointer-auto flex flex-col gap-4">
            <button onclick="placeBlock()" class="w-20 h-20 bg-blue-600 rounded-full text-white text-4xl shadow-2xl">+</button>
            <button onclick="mineBlock()" class="w-20 h-20 bg-red-600 rounded-full text-white text-3xl shadow-2xl"><i class="bi bi-hammer"></i></button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, player;
        let keys = { w: false, a: false, s: false, d: false };
        let isFirstPerson = false;
        let moveRotation = 0;

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            // World
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            for(let x = -10; x < 10; x++) {
                for(let z = -10; z < 10; z++) {
                    const cube = new THREE.Mesh(geo, grassMat);
                    cube.position.set(x, 0, z);
                    scene.add(cube);
                }
            }

            // Player character
            const skinUrl = localStorage.getItem('suscraft_skin');
            const playerMat = new THREE.MeshStandardMaterial({ color: skinUrl ? 0xffffff : 0x3b82f6 });
            if(skinUrl) {
                new THREE.TextureLoader().load(skinUrl, (t) => {
                    playerMat.map = t;
                    playerMat.needsUpdate = true;
                });
            }
            player = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), playerMat);
            player.position.set(0, 1.5, 0);
            scene.add(player);

            // Controls
            let lastX = 0;
            window.addEventListener('touchstart', e => { lastX = e.touches[0].clientX; });
            window.addEventListener('touchmove', e => {
                const deltaX = e.touches[0].clientX - lastX;
                moveRotation -= deltaX * 0.007;
                lastX = e.touches[0].clientX;
            });

            animate();
        }

        function toggleCamera() {
            isFirstPerson = !isFirstPerson;
            player.visible = !isFirstPerson;
        }

        function placeBlock() {
            const stoneMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
            const cube = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), stoneMat);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion);
            cube.position.copy(player.position).add(dir.multiplyScalar(2));
            cube.position.set(Math.round(cube.position.x), Math.round(cube.position.y), Math.round(cube.position.z));
            scene.add(cube);
        }

        function mineBlock() {
            const ray = new THREE.Raycaster();
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion);
            ray.set(player.position, dir);
            const hits = ray.intersectObjects(scene.children);
            if(hits.length > 0 && hits[0].object !== player) scene.remove(hits[0].object);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!player) return;

            player.rotation.y = moveRotation;
            const speed = 0.12;
            if(keys.w) player.translateZ(-speed);
            if(keys.s) player.translateZ(speed);
            if(keys.a) player.translateX(-speed);
            if(keys.d) player.translateX(speed);

            if(isFirstPerson) {
                camera.position.copy(player.position).y += 0.6;
                camera.rotation.y = player.rotation.y;
            } else {
                const offset = new THREE.Vector3(0, 3, 6).applyQuaternion(player.quaternion);
                camera.position.copy(player.position).add(offset);
                camera.lookAt(player.position);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

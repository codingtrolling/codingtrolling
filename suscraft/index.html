<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SusCraft // codingtrolling</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { margin: 0; overflow: hidden; background: #0b0f1a; touch-action: none; font-family: sans-serif; color: white; }
        
        /* Main Menu Layout */
        #main-menu {
            position: fixed; inset: 0; z-index: 200;
            background: radial-gradient(circle at center, #1e293b 0%, #0b0f1a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .menu-btn {
            width: 280px; padding: 15px; margin: 10px; 
            background: #2563eb; color: white; font-weight: bold; 
            text-align: center; border-radius: 12px; cursor: pointer; 
            border: none; transition: transform 0.2s, background 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .menu-btn:hover { background: #3b82f6; transform: scale(1.05); }
        .menu-btn:active { transform: scale(0.95); }

        /* Profile Modal Styles */
        #profile-modal {
            display: none; position: fixed; inset: 0; z-index: 300;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
        }

        .settings-card {
            background: #1a1a1a; border: 2px solid #2563eb;
            padding: 2rem; border-radius: 20px; width: 90%; max-width: 400px;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.3);
        }

        input {
            width: 100%; background: #2d2d2d; border: 1px solid #3f3f3f;
            padding: 12px; border-radius: 8px; color: white; margin-bottom: 1.5rem;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #2563eb; }

        .ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: none; }
        .pointer-auto { pointer-events: auto; }
    </style>
</head>
<body>

    <div id="profile-modal">
        <div class="settings-card">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic tracking-tighter">SETTINGS</h2>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-white transition-colors">
                    <i class="bi bi-x-lg text-xl"></i>
                </button>
            </div>
            
            <label class="block text-blue-400 text-xs font-bold mb-2 uppercase">Player Name</label>
            <input type="text" id="username-input" placeholder="Guest_1234">
            
            <label class="block text-blue-400 text-xs font-bold mb-2 uppercase">Skin URL (.png)</label>
            <input type="text" id="skin-input" placeholder="https://example.com/skin.png">
            
            <button onclick="saveProfile()" class="menu-btn w-full m-0">Save Changes</button>
        </div>
    </div>

    <div id="main-menu">
        <div class="absolute top-6 right-6">
            <button onclick="openSettings()" class="bg-white/10 hover:bg-white/20 text-white w-14 h-14 rounded-full flex items-center justify-center transition-all border border-white/10">
                <i class="bi bi-gear-fill text-2xl"></i>
            </button>
        </div>

        <h1 class="text-7xl font-black text-white mb-2 italic tracking-tighter">SUSCRAFT</h1>
        <p class="text-blue-500 font-bold mb-12 tracking-widest text-xs uppercase">By codingtrolling</p>
        
        <button class="menu-btn" onclick="location.href='suscraft/index.html'">Play Game</button>
        <button class="menu-btn opacity-50 cursor-not-allowed">Multiplayer</button>
        <button class="menu-btn bg-red-600/20 text-red-500 mt-4 border border-red-500/30" onclick="alert('Quitting...')">Quit</button>
    </div>

    <script>
        // Check URL on Load
        window.addEventListener('DOMContentLoaded', () => {
            // Load Saved Data
            document.getElementById('username-input').value = localStorage.getItem('suscraft_username') || '';
            document.getElementById('skin-input').value = localStorage.getItem('suscraft_skin') || '';

            // Check if URL already has #settings
            if(window.location.hash === '#settings') {
                showModal(true);
            }
        });

        // Listen for back/forward button hash changes
        window.addEventListener('hashchange', () => {
            if(window.location.hash === '#settings') {
                showModal(true);
            } else {
                showModal(false);
            }
        });

        function openSettings() {
            window.location.hash = 'settings'; // Changes URL to codingtrolling.com/#settings
        }

        function closeSettings() {
            window.location.hash = ''; // Clears hash
        }

        function showModal(visible) {
            const modal = document.getElementById('profile-modal');
            modal.style.display = visible ? 'flex' : 'none';
        }

        function saveProfile() {
            const user = document.getElementById('username-input').value;
            const skin = document.getElementById('skin-input').value;
            
            localStorage.setItem('suscraft_username', user);
            localStorage.setItem('suscraft_skin', skin);
            
            closeSettings();
            // Subtle feedback
            console.log("Profile saved successfully.");
        }
    </script>
</body>
</html>

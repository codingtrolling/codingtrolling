<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SusCraft // codingtrolling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #000; margin: 0; overflow: hidden; touch-action: none; font-family: 'Courier New', Courier, monospace; }
        #gameCanvas { image-rendering: pixelated; display: block; }
        
        /* UI Layers */
        .ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
        .controls { pointer-events: auto; position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 50px); gap: 10px; }
        .control-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; }
        
        .inventory { pointer-events: auto; position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 15px; }
        .slot { width: 45px; height: 45px; border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; background-size: cover; }
        .slot.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.3); }

        #hotbar-label { position: absolute; bottom: 90px; right: 30px; color: white; font-weight: bold; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <a href="/" class="fixed top-5 left-5 pointer-events-auto bg-black/50 p-2 rounded-lg text-white">
            <i class="bi bi-house-door-fill"></i> Exit
        </a>

        <div id="hotbar-label">Grass Block</div>

        <div class="controls">
            <div></div><div class="control-btn" ontouchstart="move('up')"><i class="bi bi-arrow-up-short"></i></div><div></div>
            <div class="control-btn" ontouchstart="move('left')"><i class="bi bi-arrow-left-short"></i></div>
            <div class="control-btn" ontouchstart="move('down')"><i class="bi bi-arrow-down-short"></i></div>
            <div class="control-btn" ontouchstart="move('right')"><i class="bi bi-arrow-right-short"></i></div>
        </div>

        <div class="inventory">
            <div class="slot active" onclick="setBlock(1)" id="slot1" style="background-image: url('https://img.itch.zone/aW1nLzI0MTYyNjkucG5n/original/eGfK%2Bx.png');"></div>
            <div class="slot" onclick="setBlock(2)" id="slot2" style="background-image: url('https://p7.hiclipart.com/preview/450/463/972/minecraft-video-game-cobblestone-block-grass.jpg'); background-size: cover;"></div>
            <div class="slot" onclick="setBlock(0)" id="slot3"><i class="bi bi-eraser text-white"></i></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game Settings
        const tileSize = 40;
        const world = [];
        const player = { x: 100, y: 100, w: 32, h: 48, vx: 0, vy: 0, skin: new Image() };
        let selectedBlock = 1;

        // Load Skin from LocalStorage
        const userSkin = localStorage.getItem('suscraft_skin');
        player.skin.src = userSkin || "https://www.minecraft.net/etc.clientlibs/minecraft/clientlibs/main/resources/img/steve.png";

        function initWorld() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let x=0; x < 50; x++) {
                world[x] = [];
                for(let y=0; y < 20; y++) {
                    world[x][y] = y > 10 ? (y > 14 ? 2 : 1) : 0; // 0: Air, 1: Grass, 2: Stone
                }
            }
        }

        function move(dir) {
            if(dir === 'left') player.vx = -5;
            if(dir === 'right') player.vx = 5;
            if(dir === 'up') player.vy = -12; // Jump
            setTimeout(() => { player.vx = 0; }, 200);
        }

        function setBlock(id) {
            selectedBlock = id;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('hotbar-label').innerText = id === 1 ? "Grass" : id === 2 ? "Stone" : "Eraser";
        }

        // Tap to Mine/Place
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const tx = Math.floor(touch.clientX / tileSize);
            const ty = Math.floor(touch.clientY / tileSize);
            if(world[tx]) world[tx][ty] = selectedBlock;
        });

        function update() {
            // Physics
            player.vy += 0.8; // Gravity
            player.x += player.vx;
            player.y += player.vy;

            // Simple floor collision
            if(player.y > canvas.height - 150) {
                player.y = canvas.height - 150;
                player.vy = 0;
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = "#87CEEB"; // Sky
            ctx.fillRect(0,0,canvas.width, canvas.height);

            // Draw World
            for(let x=0; x < world.length; x++) {
                for(let y=0; y < world[x].length; y++) {
                    if(world[x][y] === 1) {
                        ctx.fillStyle = "#2d5a27";
                        ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
                    } else if(world[x][y] === 2) {
                        ctx.fillStyle = "#7a7a7a";
                        ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
                    }
                }
            }

            // Draw Player with Google Skin
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            
            // Draw head (the Google profile pic)
            ctx.drawImage(player.skin, player.x, player.y, player.w, player.w);
            // Draw Body (Blue "Sus" suit)
            ctx.fillStyle = "#3b82f6";
            ctx.fillRect(player.x, player.y + player.w, player.w, player.h - player.w);
            
            ctx.restore();
        }

        window.addEventListener('resize', initWorld);
        initWorld();
        update();

    </script>
</body>
</html>

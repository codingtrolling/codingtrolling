<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login // codingtrolling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .glass { 
            background: rgba(22, 30, 45, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        input { background: #1e293b !important; border-color: #334155 !important; color: white !important; }
        input:focus { border-color: #3b82f6 !important; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <canvas id="bgCanvas"></canvas>

    <div class="glass max-w-md w-full p-10 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-black tracking-tighter uppercase mb-2">
            coding<span class="text-blue-500">trolling</span>
        </h1>
        <p class="text-slate-400 text-sm mb-8 font-medium">Login to your Utility Hub account</p>

        <form class="space-y-4 text-left">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Email</label>
                <input type="email" placeholder="name@example.com" class="w-full mt-1 p-3 rounded-xl text-sm transition-all">
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Password</label>
                <input type="password" placeholder="••••••••" class="w-full mt-1 p-3 rounded-xl text-sm transition-all">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-white transition-all shadow-lg shadow-blue-900/20 mt-2">
                Login to CodingTrolling
            </button>
        </form>

        <div class="flex items-center my-6">
            <div class="flex-grow border-t border-slate-700"></div>
            <span class="mx-3 text-slate-500 text-xs font-bold uppercase">or</span>
            <div class="flex-grow border-t border-slate-700"></div>
        </div>

        <div class="space-y-3">
            <button class="w-full flex items-center justify-center gap-3 bg-white text-black py-3 rounded-xl font-bold text-sm hover:bg-slate-200 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                Login to Google
            </button>
            <button class="w-full flex items-center justify-center gap-3 bg-black text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-800 transition-all border border-slate-700">
                <img src="https://www.svgrepo.com/show/443329/brand-apple.svg" class="w-5 h-5 invert" alt="Apple">
                Login to Apple ID
            </button>
        </div>

        <p class="mt-8 text-slate-500 text-xs">
            Don't have an account? <a href="#" class="text-blue-500 hover:underline">Create one</a>
        </p>
    </div>

    <script>
        // Simple Canvas Particle Background
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozin AI // CodingTrolling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; }
        .chat-container { height: calc(100vh - 200px); }
        .user-msg { background: #1e293b; align-self: flex-end; }
        .ai-msg { background: #2563eb; align-self: flex-start; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <nav class="p-4 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold uppercase tracking-widest">Bozin <span class="text-blue-500">AI</span></h1>
            <button onclick="setApiKey()" class="text-xs text-slate-500 hover:text-white uppercase tracking-tighter">Set API Key</button>
        </div>
    </nav>

    <main id="chat-window" class="flex-grow max-w-4xl w-full mx-auto p-4 overflow-y-auto flex flex-col gap-4 chat-container">
        <div class="ai-msg p-4 rounded-2xl rounded-tl-none max-w-[80%] shadow-lg">
            Hello! I am Bozin. I'm running on the Gemini Engine. How can I help you with math, code, or just chatting today?
        </div>
    </main>

    <footer class="p-4 bg-slate-900/50 border-t border-slate-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Ask Bozin anything..." 
                class="flex-grow bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition">SEND</button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        async function sendMessage() {
            const text = userInput.value.trim();
            const apiKey = localStorage.getItem('gemini_api_key');

            if (!text) return;
            if (!apiKey) {
                alert("Please click 'SET API KEY' at the top first!");
                return;
            }

            // Append User Message
            appendMessage(text, 'user-msg');
            userInput.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMessage(aiResponse, 'ai-msg');
            } catch (error) {
                appendMessage("Error: Make sure your API key is correct and you have an internet connection.", 'ai-msg');
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `${className} p-4 rounded-2xl max-w-[80%] shadow-lg whitespace-pre-wrap`;
            div.textContent = text;
            if(className === 'ai-msg') div.classList.add('rounded-tl-none');
            else div.classList.add('rounded-tr-none');
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setApiKey() {
            const key = prompt("Enter your Gemini API Key:");
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                alert("Key saved locally!");
            }
        }

        // Allow 'Enter' key to send
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>

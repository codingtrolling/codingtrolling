<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panny Painting // codingtrolling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #0b0f1a; touch-action: none; overflow: hidden; }
        #paintCanvas { background-color: white; cursor: crosshair; touch-action: none; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .toolbar { background: rgba(22, 30, 45, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tool-btn { transition: all 0.2s; border-radius: 12px; height: 45px; width: 45px; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
        .tool-btn.active { background: #2563eb; color: white; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 md:p-6">

    <div class="fixed top-4 left-6 z-50">
        <a href="/" class="text-white flex items-center gap-2 font-black uppercase tracking-tighter">
            <i class="bi bi-arrow-left"></i> Hub
        </a>
    </div>

    <canvas id="paintCanvas" class="rounded-3xl"></canvas>

    <div class="toolbar fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 p-3 rounded-2xl shadow-2xl z-50">
        
        <input type="color" id="colorPicker" value="#2563eb" class="w-10 h-10 border-none bg-transparent cursor-pointer">

        <div class="h-8 w-px bg-slate-700 mx-1"></div>

        <button id="brushBtn" class="tool-btn active" onclick="setTool('brush')">
            <i class="bi bi-brush-fill text-xl"></i>
        </button>
        <button id="eraserBtn" class="tool-btn" onclick="setTool('eraser')">
            <i class="bi bi-eraser-fill text-xl"></i>
        </button>

        <div class="h-8 w-px bg-slate-700 mx-1"></div>

        <div class="flex items-center gap-3 px-2">
            <i class="bi bi-circle-fill text-[8px] text-slate-500"></i>
            <input type="range" id="sizeSlider" min="1" max="50" value="10" class="w-20 md:w-32 accent-blue-600">
            <i class="bi bi-circle-fill text-lg text-slate-500"></i>
        </div>

        <div class="h-8 w-px bg-slate-700 mx-1"></div>

        <button class="tool-btn hover:text-red-400" onclick="clearCanvas()">
            <i class="bi bi-trash3-fill text-xl"></i>
        </button>
        <button class="tool-btn hover:text-green-400" onclick="saveCanvas()">
            <i class="bi bi-download text-xl"></i>
        </button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        
        let painting = false;
        let tool = 'brush';

        function init() {
            // Make canvas fit the screen while keeping space for padding
            canvas.width = window.innerWidth * 0.95;
            canvas.height = window.innerHeight * 0.8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Tool Logic
        function setTool(newTool) {
            tool = newTool;
            document.getElementById('brushBtn').classList.toggle('active', tool === 'brush');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        }

        // Draw Logic
        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;

            // Get coordinates for both touch and mouse
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = sizeSlider.value;
            ctx.strokeStyle = (tool === 'eraser') ? 'white' : colorPicker.value;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Action Logic
        function clearCanvas() {
            if(confirm("Clear everything?")) {
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function saveCanvas() {
            const link = document.createElement('a');
            link.download = `panny-art-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // Event Listeners
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); finishedPosition(); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

        window.addEventListener('resize', init);
        
        init();
    </script>
</body>
</html>

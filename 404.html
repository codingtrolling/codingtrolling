<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // Lost in the Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; overflow: hidden; }
        .glitch {
            font-size: 8rem;
            font-weight: 900;
            position: relative;
            color: white;
            letter-spacing: -5px;
        }
        .glitch::before, .glitch::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        .glitch::before { color: #3b82f6; z-index: -1; animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        .glitch::after { color: #ef4444; z-index: -2; animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite; }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(59, 130, 246, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="scanline"></div>

    <div class="text-center z-20 px-6">
        <div class="glitch mb-4">404</div>
        <h1 class="text-2xl font-black uppercase tracking-tighter mb-4">
            System<span class="text-blue-500">_Failure</span>
        </h1>
        <p class="text-slate-500 text-sm max-w-xs mx-auto mb-8 font-mono">
            The requested utility module does not exist or has been moved to a secure sector.
        </p>
        
        <div class="flex flex-col gap-4 items-center">
            <a href="/" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-900/40">
                RETURN TO HUB
            </a>
            <button onclick="history.back()" class="text-slate-500 hover:text-white text-xs font-bold uppercase tracking-widest transition">
                Go Back
            </button>
        </div>
    </div>

    <div class="absolute top-10 left-10 opacity-10 font-mono text-xs hidden md:block">
        ERR_CONNECTION_REFUSED<br>
        STATUS: LOST_IN_SPACE<br>
        SECTOR: 0x404
    </div>

</body>
</html>
